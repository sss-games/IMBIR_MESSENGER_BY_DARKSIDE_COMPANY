<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Imbir — Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        .app {
            background: #000000;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #ff5e00;
            padding: 16px 16px 10px;
            border-bottom: 2px solid #ff8c33;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 800;
            color: #000;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sub {
            font-size: 10px;
            color: #2b1a0e;
            font-weight: bold;
            margin-top: 4px;
        }
        .room-panel {
            background: #111111;
            padding: 10px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #ff5e00;
        }
        .room-panel input {
            flex: 2;
            background: #1e1e1e;
            border: 1.5px solid #ff5e00;
            padding: 10px 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            border-radius: 0;
        }
        .room-panel button {
            background: #ff5e00;
            border: none;
            color: black;
            font-weight: bold;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 0;
        }
        .room-panel button:active {
            background: #cc4a00;
        }
        .share-btn {
            background: #2c2c2c !important;
            border: 1px solid #ff5e00 !important;
            color: #ff914d !important;
        }
        .status {
            background: #1f1b17;
            padding: 8px 12px;
            font-size: 11px;
            color: #ffa559;
            border-left: 3px solid #ff5e00;
            display: flex;
            justify-content: space-between;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #030303;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 85%;
            padding: 8px 12px;
            word-wrap: break-word;
        }
        .message-left {
            background: #1a1a1a;
            border-left: 3px solid #ff5e00;
            align-self: flex-start;
            color: #f0f0f0;
        }
        .message-right {
            background: #ff5e00;
            border-right: 3px solid #ff8c33;
            align-self: flex-end;
            color: #000;
            font-weight: 500;
        }
        .msg-name {
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .message-left .msg-name { color: #ffaa66; }
        .message-right .msg-name { color: #2c1a0a; }
        .msg-text { font-size: 14px; word-break: break-word; }
        .msg-time { font-size: 9px; margin-top: 4px; text-align: right; opacity: 0.6; }
        .input-area {
            background: #0c0c0c;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 2px solid #ff5e00;
        }
        .input-area input {
            flex: 1;
            background: #1f1f1f;
            border: 1px solid #ff5e00;
            padding: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            border-radius: 0;
        }
        .input-area button {
            background: #ff5e00;
            border: none;
            color: black;
            font-weight: bold;
            padding: 0 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 0;
        }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-track { background: #111; }
        .messages::-webkit-scrollbar-thumb { background: #ff5e00; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1><span>🫚</span> IMBIR</h1>
        <div class="sub">онлайн чат • dakkside</div>
    </div>

    <div class="room-panel">
        <input type="text" id="roomInput" placeholder="Название комнаты" value="основная">
        <button id="joinBtn">⚡ Войти</button>
        <button id="copyLinkBtn" class="share-btn">🔗 Пригласить</button>
    </div>

    <div class="status">
        <span id="statusText">Подключение...</span>
        <span id="onlineCount" style="font-size: 10px;">👥 --</span>
    </div>

    <div class="messages" id="messagesList"></div>

    <div class="input-area" id="inputContainer" style="display: none;">
        <input type="text" id="messageInput" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // ========== ИМБИРЬ — МЕССЕНДЖЕР ==========
    // Используем открытый API сервер (имитация облака через localStorage + Broadcast)
    // Для реальной синхронизации между разными людьми используем публичный Relay Server
    
    // Простое решение: используем WebSocket публичный сервер wss://ws.postman-echo.com
    // Но он только для тестов. Сделаем через бесплатный сервер Socket.IO
    
    let currentRoom = localStorage.getItem('imbir_room') || 'основная';
    let userName = localStorage.getItem('imbir_user');
    let ws = null;
    let isConnected = false;
    
    if (!userName) {
        let defaultName = 'Имбирь_' + Math.floor(Math.random() * 999);
        let inputName = prompt('🔥 Твой ник в чате:', defaultName);
        if (!inputName || inputName.trim() === '') inputName = defaultName;
        userName = inputName.substring(0, 25);
        localStorage.setItem('imbir_user', userName);
    }
    
    // DOM элементы
    const roomInput = document.getElementById('roomInput');
    const joinBtn = document.getElementById('joinBtn');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const statusText = document.getElementById('statusText');
    const onlineCountSpan = document.getElementById('onlineCount');
    const messagesDiv = document.getElementById('messagesList');
    const inputContainer = document.getElementById('inputContainer');
    const messageInput = document.getElementById('messageInput');
    
    roomInput.value = currentRoom;
    
    // Сообщения в текущей сессии
    let messages = [];
    
    function addMessageToUI(sender, text, isMe = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isMe ? 'message-right' : 'message-left'}`;
        const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `
            <div class="msg-name">${escapeHtml(sender)}</div>
            <div class="msg-text">${escapeHtml(text)}</div>
            <div class="msg-time">${timeStr}</div>
        `;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) {
            statusText.innerText = '❌ Нет соединения';
            return;
        }
        
        const msgData = {
            type: 'message',
            room: currentRoom,
            user: userName,
            text: text,
            time: Date.now()
        };
        
        ws.send(JSON.stringify(msgData));
        addMessageToUI(userName, text, true);
        messageInput.value = '';
        statusText.innerText = `✅ ${currentRoom}`;
        setTimeout(() => {
            if (isConnected) statusText.innerText = `✅ ${currentRoom}`;
        }, 1000);
    }
    
    function connectWebSocket() {
        // Используем публичный WebSocket эхо-сервер с шиной сообщений
        // Альтернатива: wss://demo.piesocket.com/v3/channel_1?api_key=VCXCEuvhGcBDP7XhiJJUDvR1e1D3eiVjgZ9VRiaV&notify_self
        // Но проще всего использовать бесплатный сервер wss://ws.ifelse.io
        
        const wsUrl = 'wss://ws.ifelse.io';
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            isConnected = true;
            statusText.innerText = `✅ ${currentRoom} • онлайн`;
            onlineCountSpan.innerHTML = '👥 1+';
            inputContainer.style.display = 'flex';
            
            // Отправляем приветствие комнаты
            ws.send(JSON.stringify({
                type: 'join',
                room: currentRoom,
                user: userName
            }));
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'message' && data.room === currentRoom && data.user !== userName) {
                    addMessageToUI(data.user, data.text, false);
                }
            } catch(e) {
                // Игнорируем не-JSON сообщения
            }
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
            statusText.innerText = '⚠️ Ошибка соединения';
        };
        
        ws.onclose = () => {
            isConnected = false;
            statusText.innerText = '🔄 Переподключение...';
            setTimeout(connectWebSocket, 3000);
        };
    }
    
    function joinRoom() {
        let newRoom = roomInput.value.trim();
        if (!newRoom) newRoom = 'основная';
        newRoom = newRoom.replace(/[^a-zA-Zа-яА-Я0-9_-]/g, '_').substring(0, 30);
        if (!newRoom) newRoom = 'chat';
        
        currentRoom = newRoom;
        localStorage.setItem('imbir_room', currentRoom);
        roomInput.value = currentRoom;
        
        // Очищаем сообщения
        messagesDiv.innerHTML = '';
        
        // Переподключаемся с новой комнатой
        if (ws) ws.close();
        connectWebSocket();
        
        statusText.innerText = `🟠 Подключение к ${currentRoom}...`;
        messageInput.focus();
    }
    
    function copyInviteLink() {
        const url = window.location.href.split('?')[0];
        const link = `${url}?room=${encodeURIComponent(currentRoom)}`;
        navigator.clipboard.writeText(link);
        copyLinkBtn.innerText = '✅ Скопировано!';
        setTimeout(() => {
            copyLinkBtn.innerText = '🔗 Пригласить';
        }, 2000);
    }
    
    // Обработчики
    window.sendMessage = sendMessage;
    joinBtn.onclick = joinRoom;
    copyLinkBtn.onclick = copyInviteLink;
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Автовход
    const urlRoom = new URLSearchParams(window.location.search).get('room');
    if (urlRoom) {
        roomInput.value = decodeURIComponent(urlRoom);
    }
    
    // Подключаемся
    setTimeout(() => joinRoom(), 100);
</script>
</body>
</html>
